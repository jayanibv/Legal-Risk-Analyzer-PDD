name: 2. DAST Vulnerability Tests
on:
  push:
    branches: [ "main" ]
jobs:
  dast-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install Dependencies
      run: pip install requests openpyxl pandas
    - name: Run DAST Security Scanner
      run: python automated_test/dast_runner.py
