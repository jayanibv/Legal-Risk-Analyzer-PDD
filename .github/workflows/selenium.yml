name: 1. Selenium UI Tests
on:
  push:
    branches: [ "main" ]
jobs:
  selenium-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install Dependencies
      run: pip install pytest selenium requests webdriver-manager openpyxl pandas
    - name: Run Selenium Tests
      run: pytest tests/
