name: Automated Testing Pipeline

# This tells GitHub to run these tests every time you push code to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10" # You can change this to your Python version

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Assuming you have a requirements.txt file, otherwise we will need to add the install commands here.
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest selenium requests 

    - name: Run Selenium Tests
      run: |
        # This command runs the tests in your tests/ folder
        pytest tests/

    - name: Run Vulnerability (DAST) Tests
      run: |
        # This command runs the tests in your automated_test/ folder
        pytest automated_test/
